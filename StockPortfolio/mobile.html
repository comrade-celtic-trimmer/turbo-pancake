<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #eef6fb;
    --surface:   #ffffff;
    --border:    #d4e8f5;
    --up:        #0d9e6e;
    --down:      #e03050;
    --text:      #1c2b3a;
    --muted:     #7a95aa;
    --accent:    #2e8de8;
    --accent2:   #38c9a8;
    --gold:      #e07b20;
    --pill-up-bg:   #d4f5eb;
    --pill-down-bg: #fde0e5;
    --shadow:    0 2px 16px rgba(46,141,232,0.08);
    --tab-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ---- HEADER ---- */
  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 52px;
    background: #ffffff;
    border-bottom: 1.5px solid var(--border);
    box-shadow: 0 2px 8px rgba(46,141,232,0.06);
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  header h1 { font-size: 1.1rem; font-weight: 900; color: var(--accent); }
  .header-tag { background: #e0f0fb; color: var(--accent); font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; }
  #refresh-btn {
    display: flex; align-items: center; gap: 5px;
    background: var(--accent); border: none; border-radius: 8px;
    padding: 6px 12px; color: white;
    font-family: 'Nunito', sans-serif; font-size: 0.72rem; font-weight: 700; cursor: pointer;
  }
  #refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- SUMMARY STRIP ---- */
  #summary {
    flex-shrink: 0;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 12px 16px;
    background: var(--bg);
    border-bottom: 1.5px solid var(--border);
  }
  .summary-card { background: var(--surface); border-radius: 12px; padding: 12px 14px; border: 1.5px solid var(--border); }
  .summary-label { font-size: 0.58rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .summary-value { font-family: 'DM Mono', monospace; font-size: 1.15rem; font-weight: 500; color: var(--text); line-height: 1; margin-bottom: 3px; }
  .summary-value.up   { color: var(--up); }
  .summary-value.down { color: var(--down); }
  .summary-sub { font-size: 0.62rem; color: var(--muted); font-weight: 600; }

  /* ---- TAB BAR ---- */
  #tab-bar {
    flex-shrink: 0;
    display: flex;
    height: var(--tab-h);
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(14px);
    border-top: 1.5px solid rgba(0,0,0,0.07);
    padding-bottom: env(safe-area-inset-bottom);
    order: 99;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 0.58rem;
    font-weight: 800; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    gap: 3px; padding-bottom: 4px;
    position: relative;
  }
  .tab-btn .tab-icon { font-size: 1.3rem; line-height: 1; }
  .tab-btn::after { content:''; position:absolute; top:0; left:20%; right:20%; height:3px; border-radius:0 0 3px 3px; background:transparent; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after { background: var(--accent); }

  /* ---- PANES ---- */
  #panel { flex: 1; overflow: hidden; }
  .tab-pane { display: none; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 16px 20px; }
  .tab-pane.active { display: block; }

  .section-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1.5px solid var(--border); }

  /* ---- HOLDING CARDS ---- */
  .holding-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    box-shadow: var(--shadow); cursor: pointer; transition: border-color 0.15s;
  }
  .holding-card.active { border-color: var(--accent); background: #e8f3fd; }
  .hc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .hc-sym  { font-size: 1rem; font-weight: 900; color: var(--accent); }
  .hc-name { font-size: 0.62rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .hc-price { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; text-align: right; }
  .hc-day  { font-size: 0.68rem; text-align: right; margin-top: 2px; }
  .hc-day.up   { color: var(--up); }
  .hc-day.down { color: var(--down); }
  .hc-row  { display: flex; justify-content: space-between; font-size: 0.72rem; margin-top: 6px; }
  .hc-label { color: var(--muted); font-weight: 700; }
  .hc-val  { font-family: 'DM Mono', monospace; font-size: 0.72rem; }
  .hc-val.up   { color: var(--up); }
  .hc-val.down { color: var(--down); }
  .loading-card { text-align: center; padding: 28px; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
  .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }

  /* ---- CHART PANE ---- */
  #chart-header { margin-bottom: 12px; }
  #chart-ticker-label { font-size: 1rem; font-weight: 800; color: var(--text); }
  #chart-ticker-label span { font-size: 0.72rem; color: var(--muted); font-weight: 600; margin-left: 6px; }
  .cost-basis-note { font-size: 0.62rem; font-weight: 700; color: var(--gold); margin-top: 3px; }
  .range-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .range-btn { font-family: 'Nunito', sans-serif; font-size: 0.68rem; font-weight: 700; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 10px; color: var(--muted); cursor: pointer; }
  .range-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  #chart-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 12px 12px; position: relative; height: 240px; margin-top: 12px; box-shadow: var(--shadow); }
  #chart-canvas { width: 100% !important; height: 100% !important; }
  #chart-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-size: 0.78rem; font-weight: 700; border-radius: 14px; background: var(--surface); }
  #chart-placeholder .ph-icon { font-size: 1.8rem; opacity: 0.35; }

  /* ---- ALLOCATION PANE ---- */
  #alloc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .alloc-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; cursor: pointer; box-shadow: var(--shadow); }
  .alloc-card.active { border-color: var(--accent); background: #e8f3fd; }
  .alloc-ticker { font-size: 0.88rem; font-weight: 800; color: var(--accent); margin-bottom: 7px; }
  .alloc-bar-track { height: 4px; background: #e0edf7; border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .alloc-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; }
  .alloc-pct { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text); font-weight: 500; }
  .alloc-val { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); margin-top: 2px; }

  /* ---- ERROR ---- */
  #error-bar { display: none; background: #fff3cd; border: 1.5px solid #ffc107; border-radius: 10px; padding: 10px 14px; font-size: 0.72rem; font-weight: 700; color: #856404; margin-bottom: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 Portfolio</h1>
    <span class="header-tag">ASX · AUD</span>
  </div>
  <button id="refresh-btn" onclick="loadAll()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0018.49 15"/></svg>
    Refresh
  </button>
</header>

<div id="summary">
  <div class="summary-card">
    <div class="summary-label">Portfolio Value</div>
    <div class="summary-value" id="s-value">—</div>
    <div class="summary-sub">total value</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Total P&amp;L</div>
    <div class="summary-value" id="s-pnl">—</div>
    <div class="summary-sub" id="s-pnl-sub">vs cost basis</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Day Change</div>
    <div class="summary-value" id="s-day">—</div>
    <div class="summary-sub" id="s-day-sub">since prev close</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Cost Basis</div>
    <div class="summary-value" id="s-cost">—</div>
    <div class="summary-sub">total invested</div>
  </div>
</div>

<div id="panel">

  <!-- PANE: HOLDINGS -->
  <div class="tab-pane active" id="pane-holdings">
    <div id="error-bar"></div>
    <div class="section-label">Holdings — tap to view chart</div>
    <div id="holdings-cards">
      <div class="loading-card"><span class="loading-spinner"></span>Fetching live prices...</div>
    </div>
  </div>

  <!-- PANE: CHART -->
  <div class="tab-pane" id="pane-chart">
    <div id="chart-header">
      <div id="chart-ticker-label">Tap a holding to load chart <span></span></div>
      <div class="cost-basis-note" id="cost-basis-note" style="display:none"></div>
      <div class="range-btns">
        <button class="range-btn active" onclick="setRange('1mo','1d',this)">1M</button>
        <button class="range-btn" onclick="setRange('3mo','1d',this)">3M</button>
        <button class="range-btn" onclick="setRange('6mo','1wk',this)">6M</button>
        <button class="range-btn" onclick="setRange('1y','1wk',this)">1Y</button>
        <button class="range-btn" onclick="setRange('2y','1wk',this)">2Y</button>
        <button class="range-btn" onclick="setRange('5y','1mo',this)">5Y</button>
      </div>
    </div>
    <div id="chart-wrap">
      <canvas id="chart-canvas"></canvas>
      <div id="chart-placeholder"><span class="ph-icon">📈</span>Tap any holding first</div>
    </div>
  </div>

  <!-- PANE: ALLOCATION -->
  <div class="tab-pane" id="pane-alloc">
    <div class="section-label">Allocation by Market Value</div>
    <div id="alloc-grid"></div>
  </div>

</div>

<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('holdings',this)">
    <span class="tab-icon">📋</span>Holdings
  </button>
  <button class="tab-btn" onclick="switchTab('chart',this)">
    <span class="tab-icon">📈</span>Chart
  </button>
  <button class="tab-btn" onclick="switchTab('alloc',this)">
    <span class="tab-icon">🥧</span>Allocation
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  btn.classList.add('active');
}

const HOLDINGS = [
  { sym:'DHHF.AX', name:'Diversified All Growth',   units:807,  avgCost:37.06  },
  { sym:'A200.AX', name:'BetaShares Aus 200',        units:168,  avgCost:137.64 },
  { sym:'VGS.AX',  name:'Vanguard Global Shares',    units:157,  avgCost:138.54 },
  { sym:'HACK.AX', name:'BetaShares Cybersecurity',  units:1652, avgCost:14.42  },
  { sym:'ETHI.AX', name:'BetaShares Global Sust.',   units:1052, avgCost:15.05  },
  { sym:'NDQ.AX',  name:'BetaShares NASDAQ 100',     units:300,  avgCost:53.65  },
  { sym:'NAB.AX',  name:'National Australia Bank',   units:218,  avgCost:33.66  },
  { sym:'SEMI.AX', name:'BetaShares Semiconductors', units:339,  avgCost:10.20  },
  { sym:'GOLD.AX', name:'BetaShares Gold Bullion',   units:40,   avgCost:21.20  },
];

let liveData={}, chartInst=null, activeSym=null;
let chartRange={range:'1mo',interval:'1d'};

const PROXIES=[
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];

async function tryFetch(url,timeoutMs=8000) {
  for (const p of PROXIES) {
    try { const res=await fetch(p(url),{signal:AbortSignal.timeout(timeoutMs)}); if(!res.ok) continue; const text=await res.text(); if(text&&text.length>20) return text; } catch(e) {}
  }
  return null;
}

async function fetchTicker(sym) {
  const text=await tryFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2d`);
  if (!text) return null;
  try { const d=JSON.parse(text),m=d.chart.result[0].meta; return {price:m.regularMarketPrice,prev:m.chartPreviousClose}; } catch(e) { return null; }
}

async function fetchHistory(sym,range,interval) {
  const text=await tryFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${interval}&range=${range}`,12000);
  if (!text) return null;
  try {
    const d=JSON.parse(text),result=d.chart.result[0],times=result.timestamp,closes=result.indicators.quote[0].close,pts=[];
    for (let i=0;i<times.length;i++) if(closes[i]!=null) pts.push({x:new Date(times[i]*1000),y:closes[i]});
    return pts;
  } catch(e) { return null; }
}

function fmt(n,dp=2) { if(n==null||isNaN(n)) return '—'; return n.toLocaleString('en-AU',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function fmtCur(n) { if(n==null||isNaN(n)) return '—'; return (n<0?'-$':'$')+Math.abs(n).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function renderCards(rows) {
  const container=document.getElementById('holdings-cards');
  container.innerHTML=rows.map(({h,d,value,pnl,pnlPct,dayChg,dayPct})=>{
    const isUp=pnl!=null&&pnl>=0,dayUp=dayChg!=null&&dayChg>=0;
    return `<div class="holding-card ${activeSym===h.sym?'active':''}" onclick="selectTicker('${h.sym}','${h.name}',${h.avgCost})">
      <div class="hc-top">
        <div><div class="hc-sym">${h.sym.replace('.AX','')}</div><div class="hc-name">${h.name}</div></div>
        <div>
          <div class="hc-price">${d?'$'+fmt(d.price):'—'}</div>
          <div class="hc-day ${dayUp?'up':'down'}">${dayChg!=null?(dayUp?'▲':'▼')+' '+fmt(Math.abs(dayPct))+'%':'—'}</div>
        </div>
      </div>
      <div class="hc-row"><span class="hc-label">Units</span><span class="hc-val">${h.units.toLocaleString()}</span></div>
      <div class="hc-row"><span class="hc-label">Avg Cost</span><span class="hc-val">$${fmt(h.avgCost)}</span></div>
      <div class="hc-row"><span class="hc-label">Mkt Value</span><span class="hc-val">${value!=null?'$'+fmt(value):'—'}</span></div>
      <div class="hc-row"><span class="hc-label">P&amp;L</span><span class="hc-val ${pnl!=null?(isUp?'up':'down'):''}">${fmtCur(pnl)}${pnlPct!=null?' ('+(isUp?'+':'')+fmt(pnlPct)+'%)':''}</span></div>
    </div>`;
  }).join('');
}

function renderAlloc(totalValue) {
  const grid=document.getElementById('alloc-grid');
  if(!totalValue) return;
  const sorted=[...HOLDINGS].map(h=>{const d=liveData[h.sym];return {...h,val:d?h.units*d.price:h.units*h.avgCost};}).sort((a,b)=>b.val-a.val);
  grid.innerHTML=sorted.map(h=>{const pct=(h.val/totalValue*100).toFixed(1);return `<div class="alloc-card ${activeSym===h.sym?'active':''}" onclick="selectTicker('${h.sym}','${h.name}',${h.avgCost})"><div class="alloc-ticker">${h.sym.replace('.AX','')}</div><div class="alloc-bar-track"><div class="alloc-bar-fill" style="width:${pct}%"></div></div><div class="alloc-pct">${pct}%</div><div class="alloc-val">$${fmt(h.val)}</div></div>`;}).join('');
}

function updateSummary(rows) {
  let totalValue=0,totalCost=0,totalDay=0;
  rows.forEach(({value,cost,dayChg})=>{ if(value!=null) totalValue+=value; totalCost+=cost; if(dayChg!=null) totalDay+=dayChg; });
  const totalPnl=totalValue-totalCost,totalPnlPct=totalCost?(totalPnl/totalCost)*100:0;
  const vUp=totalPnl>=0,dUp=totalDay>=0;
  document.getElementById('s-value').textContent='$'+fmt(totalValue);
  document.getElementById('s-pnl').textContent=fmtCur(totalPnl);
  document.getElementById('s-pnl').className='summary-value '+(vUp?'up':'down');
  document.getElementById('s-pnl-sub').textContent=(vUp?'+':'')+fmt(totalPnlPct)+'% return';
  document.getElementById('s-day').textContent=fmtCur(totalDay);
  document.getElementById('s-day').className='summary-value '+(dUp?'up':'down');
  document.getElementById('s-day-sub').textContent=(dUp?'▲':'▼')+' today';
  document.getElementById('s-cost').textContent='$'+fmt(totalCost);
  renderAlloc(totalValue);
}

function buildRows() {
  return HOLDINGS.map(h=>{
    const d=liveData[h.sym],cost=h.units*h.avgCost,value=d?h.units*d.price:null;
    const pnl=value!=null?value-cost:null,pnlPct=pnl!=null?(pnl/cost)*100:null;
    const dayChg=d?h.units*(d.price-d.prev):null,dayPct=d?((d.price-d.prev)/d.prev)*100:null;
    return {h,d,cost,value,pnl,pnlPct,dayChg,dayPct};
  });
}

async function selectTicker(sym,name,avgCost) {
  activeSym=sym;
  const rows=buildRows(); renderCards(rows);
  // Switch to chart tab
  switchTab('chart', document.querySelectorAll('.tab-btn')[1]);
  document.getElementById('chart-ticker-label').innerHTML=sym.replace('.AX','')+` <span>${name}</span>`;
  const note=document.getElementById('cost-basis-note');
  note.style.display='block'; note.textContent=`— avg cost $${avgCost.toFixed(2)} per unit`;
  await drawChart(sym,avgCost);
}

async function setRange(range,interval,btn) {
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); chartRange={range,interval};
  if (activeSym) { const h=HOLDINGS.find(h=>h.sym===activeSym); await drawChart(activeSym,h?.avgCost); }
}

async function drawChart(sym,avgCost) {
  const ph=document.getElementById('chart-placeholder');
  ph.innerHTML=`<span class="loading-spinner"></span><span>Loading ${sym.replace('.AX','')}...</span>`; ph.style.display='flex';
  const pts=await fetchHistory(sym,chartRange.range,chartRange.interval);
  if (!pts||!pts.length) { ph.innerHTML=`<span class="ph-icon">⚠️</span>Could not load chart`; return; }
  ph.style.display='none';
  const lastPrice=pts[pts.length-1].y,isProfit=avgCost!=null&&lastPrice>=avgCost;
  const lineColor=isProfit?'#0d9e6e':'#e03050';
  if (chartInst) { chartInst.destroy(); chartInst=null; }
  const ctx=document.getElementById('chart-canvas').getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,220);
  grad.addColorStop(0,isProfit?'rgba(13,158,110,0.15)':'rgba(224,48,80,0.12)');
  grad.addColorStop(1,isProfit?'rgba(13,158,110,0.01)':'rgba(224,48,80,0.01)');
  chartInst=new Chart(ctx,{type:'line',data:{datasets:[{label:sym.replace('.AX',''),data:pts,borderColor:lineColor,borderWidth:2,backgroundColor:grad,fill:true,tension:0.35,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:lineColor,pointHoverBorderColor:'#fff',pointHoverBorderWidth:2},...(avgCost?[{label:'Avg Cost',data:pts.map(p=>({x:p.x,y:avgCost})),borderColor:'rgba(224,123,32,0.6)',borderWidth:1.5,borderDash:[5,4],backgroundColor:'transparent',fill:false,pointRadius:0,tension:0}]:[])]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#d4e8f5',borderWidth:1.5,titleColor:'#7a95aa',bodyColor:'#1c2b3a',titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:11,weight:'500'},padding:8,callbacks:{title:items=>new Date(items[0].parsed.x).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}),label:item=>item.datasetIndex===0?` $${item.parsed.y.toFixed(2)}`:`  cost $${item.parsed.y.toFixed(2)}`}}},scales:{x:{type:'time',grid:{color:'rgba(0,0,0,0.04)'},border:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#7a95aa',font:{family:'DM Mono',size:8},maxTicksLimit:6}},y:{position:'right',grid:{color:'rgba(0,0,0,0.04)'},border:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#7a95aa',font:{family:'DM Mono',size:8},callback:v=>'$'+v.toFixed(2)}}}}});
}

async function loadAll() {
  const btn=document.getElementById('refresh-btn'); btn.classList.add('spinning');
  document.getElementById('error-bar').style.display='none';
  const results=await Promise.all(HOLDINGS.map(async h=>({sym:h.sym,d:await fetchTicker(h.sym)})));
  let failed=0;
  results.forEach(r=>{ if(r.d) liveData[r.sym]=r.d; else failed++; });
  const rows=buildRows();
  renderCards(rows);
  updateSummary(rows);
  if (failed>0) { const bar=document.getElementById('error-bar'); bar.style.display='block'; bar.textContent=`⚠️ ${failed} ticker(s) failed — try Refresh`; }
  btn.classList.remove('spinning');
}

loadAll();
setInterval(loadAll,60000);
</script>
