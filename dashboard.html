<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Road Trip">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Road Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a18;
      --surface:  #242420;
      --surface2: #2e2e2a;
      --border:   #38382e;
      --text:     #e8e4d8;
      --muted:    #888880;
      --accent:   #c8b464;
      --rain:     #5b9fd4;
      --heat:     #d4725b;
      --cold:     #7bbfcf;
      --fuel:     #d4a85b;
      --camp:     #6db08c;
      --traffic:  #c47ab0;
      --mono:     'DM Mono', monospace;
      --display:  'Syne', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      min-height: 100%;
      padding-bottom: 40px;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
    }

    .wordmark {
      font-family: var(--display);
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .wordmark span { color: var(--muted); font-weight: 700; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    #loc-text {
      font-size: 12px;
      color: var(--text);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 9px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      transition: border-color .15s, color .15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Banners ── */
    #offline-banner {
      display: none;
      background: #2e2218;
      border-bottom: 1px solid #5a3a18;
      padding: 7px 20px;
      font-size: 12px;
      color: var(--fuel);
      text-align: center;
    }
    body.is-offline #offline-banner { display: block; }

    #last-updated {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 5px 20px;
      border-bottom: 1px solid var(--border);
      min-height: 24px;
    }

    #ios-hint {
      display: none;
      margin: 12px 20px;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    #ios-hint strong { color: var(--accent); }
    #ios-hint.show { display: block; }

    /* ── Sections ── */
    section {
      padding: 18px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: var(--display);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    #wx-section      .dot { background: var(--rain); }
    #fuel-section    .dot { background: var(--fuel); }
    #camp-section    .dot { background: var(--camp); }
    #traffic-section .dot { background: var(--traffic); }

    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Error ── */
    .err {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* ── WEATHER ── */
    .wx-alert {
      display: none;
      background: #2e1a14;
      border: 1px solid var(--heat);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 12px;
      color: var(--heat);
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .wx-alert.show { display: block; }

    .wx-now {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .wx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px;
    }
    .wx-card.span2 { grid-column: 1 / -1; }

    .wx-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }

    .wx-val {
      font-family: var(--display);
      font-weight: 700;
      font-size: 26px;
      line-height: 1;
    }
    .wx-val.c-rain { color: var(--rain); }
    .wx-val.c-heat { color: var(--heat); }
    .wx-val.c-cold { color: var(--cold); }
    .wx-val.c-text { color: var(--text); }

    .wx-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .wx-range { display: flex; align-items: baseline; gap: 16px; }
    .wx-range-item { text-align: center; }
    .wx-range-item .wx-val { font-size: 20px; }
    .wx-range-sep { color: var(--border); font-size: 18px; }

    .fc-strip {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .fc-day {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 3px;
      text-align: center;
    }
    .fc-day.today { border-color: var(--accent); }

    .fc-name { font-size: 9px;  color: var(--muted); margin-bottom: 3px; }
    .fc-icon { font-size: 15px; display: block; margin: 2px 0; }
    .fc-hi   { font-size: 11px; color: var(--heat); font-weight: 500; }
    .fc-lo   { font-size: 10px; color: var(--cold); }
    .fc-rain { font-size: 9px;  color: var(--rain); margin-top: 2px; }

    /* ── FUEL ── */
    .fuel-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .fuel-tabs::-webkit-scrollbar { display: none; }

    .fuel-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 11px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .12s;
    }
    .fuel-tab.active { border-color: var(--fuel); color: var(--fuel); background: #272010; }

    .fuel-list { display: flex; flex-direction: column; gap: 8px; }

    .fuel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      transition: border-color .12s;
    }
    .fuel-card:hover { border-color: var(--fuel); }
    .fuel-card.cheapest { border-color: #5a4820; }

    .fuel-name  { font-family: var(--display); font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .fuel-meta  { font-size: 11px; color: var(--muted); }
    .fuel-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 1px;
      background: #2a2010;
      border: 1px solid var(--fuel);
      color: var(--fuel);
      border-radius: 4px;
      padding: 1px 5px;
      margin-top: 4px;
    }

    .fuel-prices { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .fuel-price-row { display: flex; align-items: baseline; gap: 4px; }
    .fuel-type-tag {
      font-size: 9px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 3px;
      padding: 1px 4px;
    }
    .fuel-price-val { font-family: var(--display); font-weight: 700; font-size: 15px; color: var(--fuel); }
    .fuel-price-val.dim { font-size: 12px; color: var(--muted); }
    .fuel-price-unit { font-size: 10px; color: var(--muted); }

    /* ── CAMPING ── */
    .camp-list { display: flex; flex-direction: column; gap: 8px; }

    .camp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      transition: border-color .12s;
    }
    .camp-card:hover { border-color: var(--camp); }

    .camp-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .camp-name { font-family: var(--display); font-weight: 700; font-size: 14px; flex: 1; padding-right: 8px; }
    .camp-dist { font-size: 11px; color: var(--accent); white-space: nowrap; }

    .camp-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .camp-tag {
      font-size: 10px;
      background: var(--surface2);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--muted);
    }
    .camp-tag.free     { color: var(--camp);   background: #162416; }
    .camp-tag.national { color: var(--accent); background: #242010; }

    .camp-actions { display: flex; gap: 7px; }
    .camp-btn {
      font-family: var(--mono);
      font-size: 11px;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all .12s;
      display: inline-block;
    }
    .camp-btn.primary   { background: #162416; border: 1px solid var(--camp); color: var(--camp); }
    .camp-btn.primary:hover { background: #1e3020; }
    .camp-btn.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .camp-btn.secondary:hover { border-color: var(--muted); color: var(--text); }

    /* ── TRAFFIC ── */
    .traffic-list { display: flex; flex-direction: column; gap: 8px; }

    .traffic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      transition: border-color .12s;
    }
    .traffic-card:hover  { border-color: var(--traffic); }
    .traffic-card.severe { border-color: #6a2a40; }

    .traffic-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
    .traffic-road  { font-family: var(--display); font-weight: 700; font-size: 13px; }
    .traffic-delay { font-size: 11px; color: var(--heat); white-space: nowrap; }
    .traffic-desc  { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .traffic-route { font-size: 11px; color: var(--muted); }

    .traffic-severity {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 6px;
      margin-top: 6px;
    }
    .sev-0 { background: var(--surface2); color: var(--muted); }
    .sev-1 { background: #2a2010; color: var(--fuel);    border: 1px solid #4a3818; }
    .sev-2 { background: #2a1818; color: var(--heat);    border: 1px solid #5a2828; }
    .sev-3 { background: #2a1020; color: var(--traffic); border: 1px solid #5a2048; }

    .traffic-ok {
      font-size: 12px;
      color: var(--camp);
      text-align: center;
      padding: 16px;
      border: 1px solid #1a3020;
      border-radius: 8px;
      background: #141e18;
    }

    /* ── Install banner ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 13px 15px;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      align-items: center;
      gap: 12px;
    }
    #install-banner.show { display: flex; }

    .install-text { flex: 1; }
    .install-text strong { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--accent); display: block; margin-bottom: 1px; }
    .install-text span   { font-size: 11px; color: var(--muted); }

    #install-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--display);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    #install-dismiss {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    @media (min-width: 600px) {
      header, main { max-width: 500px; margin-left: auto; margin-right: auto; }
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">RT<span>_</span></div>
  <div class="header-right">
    <span id="loc-text">Locating…</span>
    <button class="btn" id="refresh-btn">↻ Refresh</button>
  </div>
</header>

<div id="offline-banner">⚡ Offline — showing cached data</div>
<div id="last-updated"></div>
<div id="ios-hint">Tap <strong>Share</strong> then <strong>Add to Home Screen</strong> to install</div>

<main>

  <!-- WEATHER -->
  <section id="wx-section">
    <div class="section-label"><span class="dot"></span>Weather</div>
    <div class="wx-alert" id="wx-alert"></div>
    <div id="wx-now" class="wx-now">
      <div class="wx-card skel" style="height:88px"></div>
      <div class="wx-card skel" style="height:88px"></div>
      <div class="wx-card span2 skel" style="height:68px"></div>
    </div>
    <div class="fc-strip" id="fc-strip">
      <div class="fc-day skel" style="height:90px"></div>
      <div class="fc-day skel" style="height:90px"></div>
      <div class="fc-day skel" style="height:90px"></div>
      <div class="fc-day skel" style="height:90px"></div>
      <div class="fc-day skel" style="height:90px"></div>
      <div class="fc-day skel" style="height:90px"></div>
      <div class="fc-day skel" style="height:90px"></div>
    </div>
  </section>

  <!-- FUEL -->
  <section id="fuel-section">
    <div class="section-label"><span class="dot"></span>Nearest Fuel</div>
    <div class="fuel-tabs" id="fuel-tabs">
      <button class="fuel-tab active" data-type="E10">E10</button>
      <button class="fuel-tab" data-type="U91">U91</button>
      <button class="fuel-tab" data-type="P95">P95</button>
      <button class="fuel-tab" data-type="P98">P98</button>
      <button class="fuel-tab" data-type="DL">Diesel</button>
    </div>
    <div class="fuel-list" id="fuel-list">
      <div class="skel" style="height:68px; border-radius:10px"></div>
      <div class="skel" style="height:68px; border-radius:10px"></div>
      <div class="skel" style="height:68px; border-radius:10px"></div>
    </div>
  </section>

  <!-- CAMPING -->
  <section id="camp-section">
    <div class="section-label"><span class="dot"></span>Nearby Camping</div>
    <div class="camp-list" id="camp-list">
      <div class="skel" style="height:96px; border-radius:10px"></div>
      <div class="skel" style="height:96px; border-radius:10px"></div>
    </div>
  </section>

  <!-- TRAFFIC -->
  <section id="traffic-section">
    <div class="section-label"><span class="dot"></span>Traffic Incidents</div>
    <div class="traffic-list" id="traffic-list">
      <div class="skel" style="height:72px; border-radius:10px"></div>
      <div class="skel" style="height:72px; border-radius:10px"></div>
    </div>
  </section>

</main>

<div id="install-banner">
  <div class="install-text">
    <strong>Install Road Trip</strong>
    <span>Works offline · lives on your home screen</span>
  </div>
  <button id="install-btn">Install</button>
  <button id="install-dismiss">×</button>
</div>

<script>
const WORKER         = 'https://spring-sky-90bc.jlmackay.workers.dev';
const CACHE_KEY      = 'rt_v2';
const FUEL_RADIUS    = 10;
const CAMP_RADIUS    = 100;
const TRAFFIC_RADIUS = 50;

let coords          = null;
let activeFuelType  = 'E10';
let allFuelStations = [];
let deferredPrompt  = null;

const WX_DESC = {
  0:'Clear', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Fog', 48:'Icy fog',
  51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain',
  71:'Light snow', 73:'Snow', 75:'Heavy snow', 77:'Snow grains',
  80:'Light showers', 81:'Showers', 82:'Heavy showers',
  85:'Snow showers', 86:'Heavy snow showers',
  95:'Thunderstorm', 96:'Thunderstorm + hail', 99:'Severe thunderstorm'
};
const WX_ICON = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',61:'🌦️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'❄️',75:'❄️',77:'🌨️',
  80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',
  95:'⛈️',96:'⛈️',99:'⛈️'
};
const TRAFFIC_CAT = {
  0:'Unknown',1:'Accident',2:'Fog',3:'Dangerous conditions',
  4:'Rain',5:'Ice',6:'Traffic jam',7:'Lane closed',8:'Road closed',
  9:'Road works',10:'Wind',11:'Flooding',14:'Broken down vehicle'
};

// Offline
function syncOffline() { document.body.classList.toggle('is-offline', !navigator.onLine); }
window.addEventListener('online', syncOffline);
window.addEventListener('offline', syncOffline);
syncOffline();

// iOS hint
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone && !localStorage.getItem('ios_hint_done')) {
  document.getElementById('ios-hint').classList.add('show');
}

// Android install
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('install_dismissed')) {
    document.getElementById('install-banner').classList.add('show');
  }
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('install-dismiss').addEventListener('click', () => {
  localStorage.setItem('install_dismissed', '1');
  document.getElementById('install-banner').classList.remove('show');
});

// Cache
function saveCache(data) { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); }
function loadCache() { try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch { return null; } }
function setLastUpdated(ts) {
  const el = document.getElementById('last-updated');
  if (!ts) return;
  const m = Math.round((Date.now() - ts) / 60000);
  el.textContent = m < 2 ? 'Updated just now' : `Updated ${m} min ago`;
}

// Location
function getLocation() {
  return new Promise((res, rej) => {
    if (!navigator.geolocation) return rej(new Error('No geolocation'));
    navigator.geolocation.getCurrentPosition(
      p => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
      rej,
      { enableHighAccuracy: true, timeout: 12000 }
    );
  });
}
async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const d = await r.json();
    const a = d.address;
    return a.suburb || a.town || a.village || a.county || 'Your location';
  } catch { return 'Your location'; }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Weather ───────────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&hourly=temperature_2m,precipitation_probability,weathercode`
    + `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum`
    + `&timezone=auto&forecast_days=7`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Weather failed');
  return r.json();
}

function renderWeather(data) {
  const { daily, hourly } = data;
  const hour = new Date().getHours();
  const tempNow      = hourly.temperature_2m[hour]             ?? daily.temperature_2m_max[0];
  const rainNow      = hourly.precipitation_probability[hour]  ?? daily.precipitation_probability_max[0];
  const wxCode       = hourly.weathercode[hour]                ?? daily.weathercode[0];
  const todayMax     = daily.temperature_2m_max[0];
  const todayMin     = daily.temperature_2m_min[0];
  const todayRainPct = daily.precipitation_probability_max[0];
  const todayRainMm  = daily.precipitation_sum[0];

  const alertEl = document.getElementById('wx-alert');
  const alerts  = [];
  if (todayMax     >= 35) alerts.push(`🔥 Heat warning: ${todayMax}°C forecast today`);
  if (todayMin     <= 2)  alerts.push(`🧊 Near-freezing overnight: ${todayMin}°C`);
  if (todayRainPct >= 70) alerts.push(`⛈️ High rain chance: ${todayRainPct}%`);
  if (todayRainMm  >= 20) alerts.push(`🌧️ Heavy rain: up to ${todayRainMm}mm today`);
  alertEl.innerHTML = alerts.join('<br>');
  alertEl.classList.toggle('show', alerts.length > 0);

  document.getElementById('wx-now').innerHTML = `
    <div class="wx-card">
      <div class="wx-label">Now</div>
      <div class="wx-val c-text">${Math.round(tempNow)}°C</div>
      <div class="wx-sub">${WX_DESC[wxCode] ?? ''} ${WX_ICON[wxCode] ?? ''}</div>
    </div>
    <div class="wx-card">
      <div class="wx-label">Rain chance</div>
      <div class="wx-val c-rain">${rainNow}%</div>
      <div class="wx-sub">${todayRainMm}mm today</div>
    </div>
    <div class="wx-card span2">
      <div class="wx-label">Today's range</div>
      <div class="wx-range">
        <div class="wx-range-item"><div class="wx-val c-heat">${Math.round(todayMax)}°</div><div class="wx-sub">max</div></div>
        <div class="wx-range-sep">—</div>
        <div class="wx-range-item"><div class="wx-val c-cold">${Math.round(todayMin)}°</div><div class="wx-sub">min</div></div>
      </div>
    </div>
  `;

  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('fc-strip').innerHTML = daily.weathercode.map((code, i) => {
    const name = i === 0 ? 'Today' : days[new Date(daily.time[i]).getDay()];
    return `
      <div class="fc-day${i === 0 ? ' today' : ''}">
        <div class="fc-name">${name}</div>
        <span class="fc-icon">${WX_ICON[code] ?? '🌡️'}</span>
        <div class="fc-hi">${Math.round(daily.temperature_2m_max[i])}°</div>
        <div class="fc-lo">${Math.round(daily.temperature_2m_min[i])}°</div>
        <div class="fc-rain">${daily.precipitation_probability_max[i]}%</div>
      </div>
    `;
  }).join('');
}

// ── Fuel ──────────────────────────────────────────────────────────────────────
async function fetchFuel(lat, lon) {
  const r = await fetch(`${WORKER}/fuel?lat=${lat}&lon=${lon}&radius=${FUEL_RADIUS}`);
  if (!r.ok) throw new Error(`Fuel ${r.status}`);
  return r.json();
}

function renderFuel(stations, type) {
  const el       = document.getElementById('fuel-list');
  const filtered = stations.filter(s => s.prices?.[type] != null).sort((a,b) => a.prices[type] - b.prices[type]);
  if (!filtered.length) { el.innerHTML = `<div class="err">No ${type} data within ${FUEL_RADIUS} km</div>`; return; }
  const cheapest = filtered[0].prices[type];
  el.innerHTML = filtered.slice(0, 6).map((s, i) => {
    const isCheap = i === 0 && s.prices[type] === cheapest;
    const priceRows = Object.entries(s.prices).filter(([,v]) => v != null).map(([k,v]) => `
      <div class="fuel-price-row">
        <span class="fuel-type-tag">${k}</span>
        <span class="fuel-price-val${k === type ? '' : ' dim'}">${v}</span>
        <span class="fuel-price-unit">¢</span>
      </div>`).join('');
    return `
      <div class="fuel-card${isCheap ? ' cheapest' : ''}">
        <div>
          <div class="fuel-name">${s.name}</div>
          <div class="fuel-meta">${s.address ?? ''} · ${s.distance != null ? s.distance.toFixed(1)+' km' : ''}</div>
          ${isCheap ? '<div class="fuel-badge">CHEAPEST NEARBY</div>' : ''}
        </div>
        <div class="fuel-prices">${priceRows}</div>
      </div>`;
  }).join('');
}

document.getElementById('fuel-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.fuel-tab');
  if (!tab) return;
  document.querySelectorAll('.fuel-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeFuelType = tab.dataset.type;
  if (allFuelStations.length) renderFuel(allFuelStations, activeFuelType);
});

// ── Camping ───────────────────────────────────────────────────────────────────
async function fetchCamping(lat, lon) {
  const r = await fetch(`${WORKER}/camping?lat=${lat}&lon=${lon}&radius=${CAMP_RADIUS}`);
  if (!r.ok) throw new Error(`Camping ${r.status}`);
  return r.json();
}

function renderCamping(sites) {
  const el = document.getElementById('camp-list');
  if (!sites?.length) { el.innerHTML = `<div class="err">No campsites within ${CAMP_RADIUS} km</div>`; return; }
  el.innerHTML = sites.map(s => {
    const tags = (s.tags ?? []).map(t =>
      `<span class="camp-tag${t==='Free'?' free':t==='National Park'?' national':''}">${t}</span>`
    ).join('');
    const bookBtn = s.booking_url
      ? `<a class="camp-btn primary" href="${s.booking_url}" target="_blank" rel="noopener">Book / Check →</a>`
      : '<span class="camp-tag free" style="padding:5px 10px">Free camp</span>';
    return `
      <div class="camp-card">
        <div class="camp-head">
          <div class="camp-name">${s.name}</div>
          <div class="camp-dist">${s.distance != null ? s.distance.toFixed(1)+' km' : ''}</div>
        </div>
        <div class="camp-tags">${tags}</div>
        <div class="camp-actions">
          ${bookBtn}
          <a class="camp-btn secondary" href="https://maps.google.com/?q=${s.lat},${s.lon}" target="_blank" rel="noopener">Map</a>
        </div>
      </div>`;
  }).join('');
}

// ── Traffic ───────────────────────────────────────────────────────────────────
async function fetchTraffic(lat, lon) {
  const r = await fetch(`${WORKER}/traffic?lat=${lat}&lon=${lon}&radius=${TRAFFIC_RADIUS}`);
  if (!r.ok) throw new Error(`Traffic ${r.status}`);
  return r.json();
}

function renderTraffic(data) {
  const el        = document.getElementById('traffic-list');
  const incidents = data?.incidents ?? [];
  if (!incidents.length) {
    el.innerHTML = `<div class="traffic-ok">✓ No incidents within ${TRAFFIC_RADIUS} km</div>`;
    return;
  }
  const sorted = incidents
    .filter(i => i.properties)
    .sort((a,b) => (b.properties.magnitudeOfDelay ?? 0) - (a.properties.magnitudeOfDelay ?? 0))
    .slice(0, 8);
  el.innerHTML = sorted.map(inc => {
    const p     = inc.properties;
    const mag   = p.magnitudeOfDelay ?? 0;
    const desc  = p.events?.[0]?.description ?? TRAFFIC_CAT[p.iconCategory] ?? 'Incident';
    const roads = (p.roadNumbers ?? []).join(', ');
    const route = (p.from && p.to) ? `${p.from} → ${p.to}` : (p.from || p.to || '');
    const delay = p.delay ? `+${Math.round(p.delay/60)} min` : '';
    const sevClass = mag >= 3 ? 'sev-3' : mag >= 2 ? 'sev-2' : mag >= 1 ? 'sev-1' : 'sev-0';
    const sevLabel = mag >= 3 ? 'Major' : mag >= 2 ? 'Moderate' : mag >= 1 ? 'Minor' : 'Low';
    return `
      <div class="traffic-card${mag >= 3 ? ' severe' : ''}">
        <div class="traffic-head">
          <div class="traffic-road">${roads || TRAFFIC_CAT[p.iconCategory] || 'Incident'}</div>
          ${delay ? `<div class="traffic-delay">${delay}</div>` : ''}
        </div>
        <div class="traffic-desc">${desc}</div>
        ${route ? `<div class="traffic-route">${route}</div>` : ''}
        <span class="traffic-severity ${sevClass}">${sevLabel}</span>
      </div>`;
  }).join('');
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  const cached = loadCache();
  if (cached?.data) {
    try {
      if (cached.data.weather) renderWeather(cached.data.weather);
      if (cached.data.fuel)    { allFuelStations = cached.data.fuel; renderFuel(allFuelStations, activeFuelType); }
      if (cached.data.camping) renderCamping(cached.data.camping);
      if (cached.data.traffic) renderTraffic(cached.data.traffic);
      setLastUpdated(cached.ts);
    } catch(e) { console.warn('Cache render:', e); }
  }

  if (!navigator.onLine) return;

  try {
    coords = await getLocation();
  } catch {
    document.getElementById('loc-text').textContent = 'Location denied';
    if (!cached) ['wx-now','fuel-list','camp-list','traffic-list'].forEach(id => {
      document.getElementById(id).innerHTML = `<div class="err">Enable location to load data</div>`;
    });
    return;
  }

  reverseGeocode(coords.lat, coords.lon).then(name => {
    document.getElementById('loc-text').textContent = name;
  });

  const [wx, fuel, camp, traffic] = await Promise.allSettled([
    fetchWeather(coords.lat, coords.lon),
    fetchFuel(coords.lat, coords.lon),
    fetchCamping(coords.lat, coords.lon),
    fetchTraffic(coords.lat, coords.lon),
  ]);

  const cd = cached?.data ?? {};

  if (wx.status === 'fulfilled')      { renderWeather(wx.value);                                             cd.weather = wx.value; }
  else if (!cached)                   { document.getElementById('wx-now').innerHTML = `<div class="err" style="grid-column:1/-1">Weather unavailable</div>`; document.getElementById('fc-strip').innerHTML = ''; }

  if (fuel.status === 'fulfilled')    { allFuelStations = fuel.value.stations ?? []; renderFuel(allFuelStations, activeFuelType); cd.fuel = allFuelStations; }
  else if (!cached)                   { document.getElementById('fuel-list').innerHTML = `<div class="err">Fuel data unavailable</div>`; }

  if (camp.status === 'fulfilled')    { const sites = camp.value.sites ?? []; renderCamping(sites);          cd.camping = sites; }
  else if (!cached)                   { document.getElementById('camp-list').innerHTML = `<div class="err">Camping data unavailable</div>`; }

  if (traffic.status === 'fulfilled') { renderTraffic(traffic.value);                                        cd.traffic = traffic.value; }
  else if (!cached)                   { document.getElementById('traffic-list').innerHTML = `<div class="err">Traffic data unavailable</div>`; }

  saveCache(cd);
  setLastUpdated(Date.now());
}

document.getElementById('refresh-btn').addEventListener('click', loadAll);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/turbo-pancake/sw.js', { scope: '/turbo-pancake/' })
    .catch(e => console.warn('SW:', e));
}

loadAll();
</script>
