<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0e9ff;
    --surface: #ffffff;
    --coral: #FF6B6B;
    --mint: #6BCB77;
    --sky: #4D96FF;
    --purple: #C77DFF;
    --orange: #FF9A3C;
    --pink: #FF6EB4;
    --dark: #2d2d2d;
    --muted: #888;
    --shadow: 0 4px 20px rgba(0,0,0,0.09);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, #ffd6e740 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, #d6e4ff40 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #e8f5e940 0%, transparent 60%);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ======== TOPBAR ======== */
  #topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 22px;
    height: 54px;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(14px);
    border-bottom: 2px solid rgba(0,0,0,0.06);
    z-index: 100;
  }

  #topbar h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    background: linear-gradient(90deg, var(--coral), var(--purple), var(--sky));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ======== 3-COLUMN LAYOUT ======== */
  #columns {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    overflow: hidden;
  }

  .col {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    border-right: 2px solid rgba(0,0,0,0.06);
  }
  .col:last-child { border-right: none; }

  .col-strip { flex-shrink: 0; height: 5px; }
  .strip-purple { background: linear-gradient(90deg, var(--purple), var(--pink)); }
  .strip-sky    { background: linear-gradient(90deg, var(--sky), var(--mint)); }
  .strip-coral  { background: var(--coral); }

  .col-header {
    flex-shrink: 0;
    padding: 14px 20px 10px;
    border-bottom: 2px solid rgba(0,0,0,0.05);
    background: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .col-header h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--dark);
  }
  .col-header h2.grad-purple {
    background: linear-gradient(90deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .col-meta {
    font-size: 0.66rem; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px; margin-left: auto;
  }

  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px 24px;
    background: rgba(255,255,255,0.35);
  }
  .col-body::-webkit-scrollbar { width: 5px; }
  .col-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

  /* ======== SUTTA ======== */
  #sutta-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--purple);
    margin-bottom: 16px;
  }

  /* Formatted sutta body */
  .sutta-body { font-size: 0.875rem; line-height: 1.9; color: #3a3a3a; }

  /* Section heading (e.g. "1. Pairs", "Introduction") */
  .sutta-section-head {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    color: var(--purple);
    margin: 18px 0 6px;
    opacity: 0.85;
  }

  /* Normal prose paragraph */
  .sutta-para {
    margin-bottom: 10px;
  }

  /* Verse line — slightly indented, italic */
  .sutta-verse {
    font-style: italic;
    padding-left: 14px;
    border-left: 3px solid rgba(199,125,255,0.35);
    margin-bottom: 6px;
    line-height: 1.7;
  }

  #sutta-link {
    display: inline-block;
    margin-top: 20px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
    border-radius: 12px;
    padding: 7px 18px;
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  #sutta-link:hover { opacity: 0.82; }
  #sutta-loading-msg { color: var(--muted); font-size: 0.9rem; }

  /* ======== TALKS ======== */
  .talk-source-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .talk-source-btn {
    flex: 1;
    background: #f0f0f0;
    border: 2px solid transparent;
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    color: #555;
    transition: all 0.15s;
    text-align: center;
  }
  .talk-source-btn.active {
    background: var(--sky);
    color: white;
    border-color: var(--sky);
  }

  #talk-player-wrap {
    background: linear-gradient(135deg, #e8f4ff, #f0fff4);
    border-radius: 16px;
    padding: 20px;
    border: 1.5px solid rgba(77,150,255,0.15);
    margin-bottom: 20px;
  }
  #talk-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: var(--sky);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  #talk-teacher {
    font-size: 0.7rem;
    color: var(--purple);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 2px;
  }
  #talk-date {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }
  #talk-audio { width: 100%; border-radius: 10px; accent-color: var(--sky); }
  #talk-link {
    display: inline-block;
    margin-top: 12px;
    color: var(--sky);
    font-size: 0.75rem;
    font-weight: 700;
    text-decoration: none;
  }
  #talk-link:hover { text-decoration: underline; }

  .talk-nav { display: flex; gap: 8px; margin-top: 16px; }
  .talk-nav button {
    flex: 1;
    background: white;
    border: 1.5px solid #dde8ff;
    border-radius: 10px;
    padding: 7px 10px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    color: var(--sky);
    transition: background 0.15s;
  }
  .talk-nav button:hover { background: #e8f4ff; }
  #talk-loading { color: var(--muted); font-size: 0.9rem; }
  #talk-error { font-size: 0.78rem; color: var(--coral); background: #fff0f0; padding: 10px; border-radius: 10px; }

  #talk-archive { margin-top: 20px; border-top: 1.5px solid rgba(0,0,0,0.06); padding-top: 16px; }
  #talk-archive h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .archive-item {
    padding: 7px 0;
    border-bottom: 1.5px solid rgba(0,0,0,0.05);
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .archive-item:last-child { border-bottom: none; }
  .archive-item:hover .archive-title { color: var(--sky); }
  .archive-play {
    flex-shrink: 0; width: 24px; height: 24px;
    background: var(--sky); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; color: white;
  }
  .archive-title { font-size: 0.8rem; font-weight: 700; color: var(--dark); line-height: 1.3; transition: color 0.15s; }
  .archive-meta  { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }

  /* ======== NEWS ======== */
  .feed-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .feed-btn {
    background: #f0f0f0; border: 2px solid transparent; border-radius: 20px;
    padding: 4px 12px; font-size: 0.72rem; font-weight: 700; cursor: pointer;
    font-family: 'Nunito', sans-serif; color: #555; transition: all 0.15s;
  }
  .feed-btn.active { background: var(--coral); color: white; border-color: var(--coral); }
  .news-item { padding: 9px 0; border-bottom: 1.5px solid rgba(0,0,0,0.06); }
  .news-item:last-child { border-bottom: none; }
  .news-item a {
    font-size: 0.83rem; font-weight: 700; color: var(--dark);
    text-decoration: none; line-height: 1.4; display: block;
  }
  .news-item a:hover { color: var(--coral); }
  .news-meta { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
  .news-source-badge {
    display: inline-block; background: var(--coral); color: white;
    border-radius: 6px; padding: 1px 7px; font-size: 0.63rem; font-weight: 700; margin-right: 4px;
  }
  .news-loading { color: var(--muted); font-size: 0.85rem; padding: 14px 0; }
  .news-error { font-size: 0.75rem; color: var(--coral); padding: 8px; background: #fff0f0; border-radius: 8px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>✨ My Dashboard</h1>
</div>

<div id="columns">

  <!-- COL 1: SUTTA -->
  <div class="col">
    <div class="col-strip strip-purple"></div>
    <div class="col-header">
      <h2 class="grad-purple">🪷 Daily Sutta</h2>
      <span class="col-meta" id="sutta-uid">Loading...</span>
    </div>
    <div class="col-body">
      <div id="sutta-loading-msg">⏳ Loading today's sutta...</div>
      <div id="sutta-content" style="display:none">
        <div id="sutta-name"></div>
        <div id="sutta-body" class="sutta-body"></div>
        <a id="sutta-link" href="#" target="_blank" rel="noopener">Read in full on SuttaCentral ↗</a>
      </div>
    </div>
  </div>

  <!-- COL 2: TALKS -->
  <div class="col">
    <div class="col-strip strip-sky"></div>
    <div class="col-header">
      <h2>🎙️ Talks</h2>
    </div>
    <div class="col-body">
      <div class="talk-source-selector">
        <button class="talk-source-btn active" id="btn-dhamma" onclick="switchTalkSource('dhamma')">Thanissaro Bhikkhu</button>
        <button class="talk-source-btn" id="btn-abhayagiri" onclick="switchTalkSource('abhayagiri')">Abhayagiri</button>
      </div>
      <div id="talk-loading">⏳ Loading talks...</div>
      <div id="talk-error" style="display:none"></div>
      <div id="talk-player-wrap" style="display:none">
        <div id="talk-title"></div>
        <div id="talk-teacher"></div>
        <div id="talk-date"></div>
        <audio id="talk-audio" controls preload="none"></audio>
        <br>
        <a id="talk-link" href="#" target="_blank" rel="noopener">Browse all talks ↗</a>
        <div class="talk-nav">
          <button onclick="prevTalk()">← Previous</button>
          <button onclick="randomTalk()">🔀 Random</button>
          <button onclick="nextTalk()">Next →</button>
        </div>
      </div>
      <div id="talk-archive" style="display:none">
        <h3>More from this archive</h3>
        <div id="talk-archive-list"></div>
      </div>
    </div>
  </div>

  <!-- COL 3: NEWS -->
  <div class="col">
    <div class="col-strip strip-coral"></div>
    <div class="col-header">
      <h2>📰 News</h2>
    </div>
    <div class="col-body">
      <div class="feed-selector" id="feed-selector"></div>
      <div id="news-list"><div class="news-loading">Loading feed...</div></div>
    </div>
  </div>

</div>

<script>
// ============================================================
//  SHARED PROXIES
// ============================================================
const PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

async function fetchWithFallback(url, timeout = 10000) {
  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(url), {signal: AbortSignal.timeout(timeout)});
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.trim().length > 100) return text;
    } catch(e) {}
  }
  throw new Error('All proxies failed for: ' + url);
}

// ============================================================
//  TALKS
// ============================================================
const TALK_SOURCES = {
  dhamma: {
    label: 'Thanissaro Bhikkhu',
    archiveUrl: 'https://www.dhammatalks.org/audio/morning/',
    browseUrl: 'https://www.dhammatalks.org/audio/morning/',
    type: 'scrape',   // parse HTML for .mp3 links
  },
  abhayagiri: {
    label: 'Abhayagiri',
    // RSS feed of recent talks
    archiveUrl: 'https://www.abhayagiri.org/talks/feed',
    browseUrl: 'https://www.abhayagiri.org/talks',
    type: 'rss',
  },
};

let allTalks   = [];
let talkIndex  = 0;
let talkSource = 'dhamma';

function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function todaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

/* --- Dhammatalks: scrape HTML for mp3 links --- */
function parseDhammaTalks(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const talks = [];
  doc.querySelectorAll('a[href$=".mp3"]').forEach(a => {
    const rawHref = a.getAttribute('href') || '';
    const mp3 = rawHref.startsWith('http')
      ? rawHref
      : 'https://www.dhammatalks.org' + (rawHref.startsWith('/') ? '' : '/') + rawHref;
    const li = a.closest('li');
    let title = a.textContent.trim() || 'Dharma Talk';
    let dateStr = '';
    if (li) {
      const titleLink = li.querySelector('a:not([href$=".mp3"])');
      if (titleLink && titleLink.textContent.trim()) title = titleLink.textContent.trim();
    }
    const dateMatch = mp3.match(/\/(\d{2})(\d{2})(\d{2})[^/]*\.mp3/);
    if (dateMatch) {
      const [, yy, mm, dd] = dateMatch;
      const yr = parseInt(yy) + (parseInt(yy) > 50 ? 1900 : 2000);
      try {
        dateStr = new Date(yr, parseInt(mm)-1, parseInt(dd))
          .toLocaleDateString([], {year:'numeric', month:'long', day:'numeric'});
      } catch(e) {}
    }
    if (mp3.includes('dhammatalks.org')) {
      talks.push({title, mp3, dateStr, teacher: 'Thanissaro Bhikkhu'});
    }
  });
  return talks;
}

/* --- Abhayagiri: parse RSS feed --- */
function parseAbhayagiriRSS(text) {
  const xml = new DOMParser().parseFromString(text, 'application/xml');
  const talks = [];
  xml.querySelectorAll('item').forEach(item => {
    // Audio may be in <enclosure> or <media:content>
    let mp3 = '';
    const enc = item.querySelector('enclosure');
    if (enc) mp3 = enc.getAttribute('url') || '';
    if (!mp3) {
      const med = item.querySelector('content');
      if (med) mp3 = med.getAttribute('url') || '';
    }
    // Also scan all attributes across namespaced elements
    if (!mp3) {
      item.querySelectorAll('*').forEach(el => {
        const u = el.getAttribute('url') || '';
        if (u.match(/\.(mp3|m4a|ogg|opus)(\?|$)/i)) mp3 = u;
      });
    }
    if (!mp3) return; // skip items with no audio

    const title   = item.querySelector('title')?.textContent?.trim() || 'Dharma Talk';
    const pub     = item.querySelector('pubDate')?.textContent || '';
    let dateStr   = '';
    try {
      dateStr = pub ? new Date(pub).toLocaleDateString([], {year:'numeric', month:'long', day:'numeric'}) : '';
    } catch(e) {}

    // Try to get teacher name from itunes:author or dc:creator
    let teacher = 'Abhayagiri';
    const authorEl = item.getElementsByTagNameNS('*','author')[0]
                  || item.querySelector('author')
                  || item.getElementsByTagNameNS('http://www.itunes.com/dtds/podcast-1.0.dtd','author')[0];
    if (authorEl && authorEl.textContent.trim()) teacher = authorEl.textContent.trim();

    talks.push({title, mp3, dateStr, teacher});
  });
  return talks;
}

function renderTalk(idx) {
  const talk = allTalks[idx];
  if (!talk) return;
  talkIndex = idx;
  document.getElementById('talk-title').textContent   = talk.title;
  document.getElementById('talk-teacher').textContent = talk.teacher || '';
  document.getElementById('talk-date').textContent    = talk.dateStr || '';
  const audio = document.getElementById('talk-audio');
  audio.src = talk.mp3;
  audio.load();
  document.getElementById('talk-link').href =
    TALK_SOURCES[talkSource].browseUrl;
  document.getElementById('talk-link').textContent = 'Browse all talks ↗';
  document.getElementById('talk-loading').style.display     = 'none';
  document.getElementById('talk-player-wrap').style.display = 'block';
  document.getElementById('talk-error').style.display       = 'none';

  // Archive list
  const archiveList = document.getElementById('talk-archive-list');
  const nearby = allTalks
    .slice(Math.max(0, idx - 2), idx + 8)
    .filter(t => t !== talk);
  archiveList.innerHTML = nearby.map(t => {
    const realIdx = allTalks.indexOf(t);
    return `<div class="archive-item" onclick="renderTalk(${realIdx})">
      <div class="archive-play">▶</div>
      <div>
        <div class="archive-title">${t.title}</div>
        <div class="archive-meta">${[t.teacher, t.dateStr].filter(Boolean).join(' · ')}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('talk-archive').style.display = nearby.length ? 'block' : 'none';
}

function prevTalk()   { if (talkIndex > 0) renderTalk(talkIndex - 1); }
function nextTalk()   { if (talkIndex < allTalks.length - 1) renderTalk(talkIndex + 1); }
function randomTalk() { renderTalk(Math.floor(Math.random() * allTalks.length)); }

async function loadTalks(source) {
  const src = TALK_SOURCES[source];
  document.getElementById('talk-loading').style.display     = 'block';
  document.getElementById('talk-loading').textContent       = '⏳ Loading talks...';
  document.getElementById('talk-player-wrap').style.display = 'none';
  document.getElementById('talk-archive').style.display     = 'none';
  document.getElementById('talk-error').style.display       = 'none';
  allTalks = [];
  try {
    const raw = await fetchWithFallback(src.archiveUrl, 12000);
    if (src.type === 'scrape') {
      allTalks = parseDhammaTalks(raw);
    } else {
      allTalks = parseAbhayagiriRSS(raw);
    }
    if (!allTalks.length) throw new Error('No talks found');
    const rand = seededRand(todaySeed());
    renderTalk(Math.floor(rand() * allTalks.length));
  } catch(e) {
    document.getElementById('talk-loading').style.display = 'none';
    const err = document.getElementById('talk-error');
    err.style.display = 'block';
    err.textContent = '⚠️ Could not load talks. Check your connection or visit the source directly.';
  }
}

function switchTalkSource(source) {
  talkSource = source;
  document.getElementById('btn-dhamma').classList.toggle('active',      source === 'dhamma');
  document.getElementById('btn-abhayagiri').classList.toggle('active',  source === 'abhayagiri');
  loadTalks(source);
}

loadTalks('dhamma');

// ============================================================
//  NEWS
// ============================================================
const RSS_FEEDS = {
  'ABC AU':      'https://www.abc.net.au/news/feed/51120/rss.xml',
  'BBC':         'https://feeds.bbci.co.uk/news/rss.xml',
  'Guardian AU': 'https://www.theguardian.com/australia-news/rss',
  'News.com.au': 'https://www.news.com.au/content-feeds/latest-news-national/',
  'Politico':    'https://rss.politico.com/politics-news.xml',
  'Al Jazeera':  'https://www.aljazeera.com/xml/rss/all.xml',
};
let activeFeed = 'Guardian AU';

function buildFeedSelector() {
  const sel = document.getElementById('feed-selector');
  sel.innerHTML = '';
  Object.keys(RSS_FEEDS).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'feed-btn' + (name === activeFeed ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { activeFeed = name; buildFeedSelector(); loadFeed(); };
    sel.appendChild(btn);
  });
}

async function loadFeed() {
  const list = document.getElementById('news-list');
  list.innerHTML = '<div class="news-loading">⏳ Fetching...</div>';
  try {
    const data = await fetchWithFallback(RSS_FEEDS[activeFeed]);
    const xml = new DOMParser().parseFromString(data, 'application/xml');
    const items = Array.from(xml.querySelectorAll('item')).slice(0, 20);
    if (!items.length) throw new Error('No items');
    list.innerHTML = items.map(item => {
      const title = item.querySelector('title')?.textContent?.trim() || 'Untitled';
      const linkEl = item.querySelector('link');
      let link = '#';
      if (linkEl) {
        const tc = linkEl.textContent?.trim();
        const ns = linkEl.nextSibling?.nodeValue?.trim();
        link = (tc && tc.startsWith('http')) ? tc : (ns && ns.startsWith('http')) ? ns : '#';
      }
      const pub  = item.querySelector('pubDate')?.textContent || '';
      const date = pub ? new Date(pub).toLocaleDateString([], {month:'short', day:'numeric'}) : '';
      return `<div class="news-item">
        <a href="${link}" target="_blank" rel="noopener">${title}</a>
        <div class="news-meta"><span class="news-source-badge">${activeFeed}</span>${date}</div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div class="news-error">⚠️ Could not load feed. Try another source or check your connection.</div>`;
  }
}
buildFeedSelector();
loadFeed();

// ============================================================
//  DAILY SUTTA  —  with proper formatting
// ============================================================
const SUTTAS = [
  {uid:'mn1',     name:'The Root of All Things'},
  {uid:'mn2',     name:'All the Taints'},
  {uid:'mn8',     name:'Expunging'},
  {uid:'mn10',    name:'Mindfulness Meditation'},
  {uid:'sn22.59', name:'The Five Aggregates'},
  {uid:'sn35.28', name:'The Fire Sermon'},
  {uid:'dn2',     name:'The Fruits of the Ascetic Life'},
  {uid:'dn9',     name:'With Poṭṭhapāda'},

/**
 * Determine whether a segment key belongs to a verse collection.
 * Verse UIDs tend to come from Dhp, Snp, Thag, Thig, Ud (verse portions).
 */
function isVerseUID(uid) {
  return /^(dhp|snp|thag|thig|ud|iti)/.test(uid.toLowerCase());
}

/**
 * Convert the flat key→string map returned by the SuttaCentral API into
 * nicely formatted HTML.
 *
 * Key format examples:
 *   "mn1:0.1"   → preamble / namo
 *   "mn1:1.1"   → section 1, segment 1
 *   "mn1:1.1.1" → verse sub-line inside section 1
 */
function buildSuttaHTML(uid, keysOrder, transMap) {
  const isVerse = isVerseUID(uid);
  let html = '';
  let currentSection = null;

  for (const key of keysOrder) {
    const text = (transMap[key] || '').trim();
    if (!text) continue;

    // Extract section number from key  e.g. "mn1:3.2" → section "3"
    // Keys with 0 in section position are preamble
    const keyParts = key.replace(/^[^:]+:/, '').split('.');
    const sectionNum = keyParts[0];

    // Detect a new section heading (integer changes, not "0")
    if (sectionNum !== currentSection && sectionNum !== '0') {
      currentSection = sectionNum;
      // Only print a divider heading if it's not the very first section
      // and the text looks like a heading (short, ends without full stop)
      if (parseInt(sectionNum) > 1 && text.length < 80 && !text.endsWith('.')) {
        html += `<div class="sutta-section-head">${text}</div>`;
        continue;
      }
    }

    // Render as verse or prose
    if (isVerse) {
      html += `<div class="sutta-verse">${text}</div>`;
    } else {
      html += `<p class="sutta-para">${text}</p>`;
    }
  }

  return html || '<p class="sutta-para">(Text not available.)</p>';
}

async function loadDailySutta() {
  const today = new Date();
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
  const sutta = SUTTAS[dayOfYear % SUTTAS.length];
  document.getElementById('sutta-uid').textContent = sutta.uid.toUpperCase() + ' · Sujato';

  try {
    const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(
      `https://suttacentral.net/api/bilarasuttas/${sutta.uid}/sujato`
    )}`;
    const resp = await fetch(proxyUrl, {signal: AbortSignal.timeout(12000)});
    const data = await resp.json();

    const order = data.keys_order || [];
    const trans = data.translation_text || {};

    document.getElementById('sutta-loading-msg').style.display = 'none';
    document.getElementById('sutta-content').style.display     = 'block';
    document.getElementById('sutta-name').textContent          = sutta.name;
    document.getElementById('sutta-body').innerHTML = buildSuttaHTML(sutta.uid, order, trans);
    document.getElementById('sutta-link').href = `https://suttacentral.net/${sutta.uid}/en/sujato`;
  } catch(e) {
    // Fallback: try second proxy
    try {
      const fb = `https://api.allorigins.win/raw?url=${encodeURIComponent(
        `https://suttacentral.net/api/bilarasuttas/${sutta.uid}/sujato`
      )}`;
      const resp2 = await fetch(fb, {signal: AbortSignal.timeout(12000)});
      const data2 = await resp2.json();
      const order2 = data2.keys_order || [];
      const trans2 = data2.translation_text || {};
      document.getElementById('sutta-loading-msg').style.display = 'none';
      document.getElementById('sutta-content').style.display     = 'block';
      document.getElementById('sutta-name').textContent          = sutta.name;
      document.getElementById('sutta-body').innerHTML = buildSuttaHTML(sutta.uid, order2, trans2);
      document.getElementById('sutta-link').href = `https://suttacentral.net/${sutta.uid}/en/sujato`;
    } catch(e2) {
      document.getElementById('sutta-loading-msg').textContent = '⚠️ Could not load sutta. Check your connection.';
    }
  }
}
loadDailySutta();
